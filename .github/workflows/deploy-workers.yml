name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "data/schema/**"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:

concurrency:
  group: deploy-workers
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ensure-d1:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    outputs:
      d1_id: ${{ steps.d1.outputs.d1_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund

      - name: Resolve or create D1 (idempotent)
        id: d1
        run: |
          set -euo pipefail
          existing=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="lottery_th") | .uuid' || true)
          if [ -z "${existing:-}" ] || [ "$existing" = "null" ]; then
            echo "D1 lottery_th not found — creating..."
            npx wrangler d1 create lottery_th
            id=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="lottery_th") | .uuid')
            if [ -z "$id" ] || [ "$id" = "null" ]; then
              echo "::error::D1 create succeeded but could not resolve UUID"
              exit 1
            fi
          else
            echo "D1 lottery_th already exists: $existing"
            id="$existing"
          fi
          echo "d1_id=$id" >> "$GITHUB_OUTPUT"

      - name: Apply schema (idempotent — CREATE ... IF NOT EXISTS)
        run: |
          set -euo pipefail
          sed -i "s/REPLACE_WITH_D1_ID/${{ steps.d1.outputs.d1_id }}/g" workers/api/wrangler.toml
          npx wrangler d1 execute lottery_th --remote --file=data/schema/schema.sql

  deploy:
    needs: ensure-d1
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    strategy:
      matrix:
        worker: [api, scraper]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund

      - name: Inject D1 ID into wrangler.toml
        run: |
          sed -i "s/REPLACE_WITH_D1_ID/${{ needs.ensure-d1.outputs.d1_id }}/g" \
            workers/${{ matrix.worker }}/wrangler.toml

      - name: Deploy ${{ matrix.worker }}
        run: npx wrangler deploy --config workers/${{ matrix.worker }}/wrangler.toml
