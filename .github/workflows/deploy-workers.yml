name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "data/schema/**"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:

concurrency:
  group: deploy-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    strategy:
      matrix:
        worker: [api, scraper]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund

      - name: Resolve D1 ID
        id: d1
        run: |
          set -euo pipefail
          id=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="lottery_th") | .uuid')
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            echo "::error::D1 database 'lottery_th' not found — run the Bootstrap workflow first"
            exit 1
          fi
          echo "d1_id=$id" >> "$GITHUB_OUTPUT"

      - name: Inject D1 ID into wrangler.toml
        run: |
          sed -i "s/REPLACE_WITH_D1_ID/${{ steps.d1.outputs.d1_id }}/g" \
            workers/${{ matrix.worker }}/wrangler.toml

      - name: Deploy ${{ matrix.worker }}
        run: npx wrangler deploy --config workers/${{ matrix.worker }}/wrangler.toml
