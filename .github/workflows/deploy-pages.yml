name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund

      - name: Ensure Pages project exists
        run: |
          set -euo pipefail
          if ! npx wrangler pages project list --json | jq -e '.[] | select(.name=="lottery-th")' > /dev/null; then
            echo "Creating Pages project lottery-th..."
            npx wrangler pages project create lottery-th \
              --production-branch=main \
              --compatibility-date=2025-01-01
          else
            echo "Pages project lottery-th already exists"
          fi

      - name: Ensure API_BASE env var is set
        run: |
          set -euo pipefail
          # ถ้าไม่มี API_BASE ให้ตั้งจาก subdomain ของ account
          current=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/lottery-th" \
            | jq -r '.result.deployment_configs.production.env_vars.API_BASE.value // ""')
          if [ -z "$current" ]; then
            sub=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
              | jq -r '.result.subdomain')
            API_BASE="https://lottery-th-api.${sub}.workers.dev"
            echo "Setting API_BASE=$API_BASE"
            curl -fsS -X PATCH \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/lottery-th" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"deployment_configs\":{\"production\":{\"env_vars\":{\"API_BASE\":{\"value\":\"${API_BASE}\"}}},\"preview\":{\"env_vars\":{\"API_BASE\":{\"value\":\"${API_BASE}\"}}}}}" \
              > /dev/null
          else
            echo "API_BASE already set: $current"
          fi

      - name: Deploy Pages
        run: npx wrangler pages deploy web --project-name=lottery-th --branch=main
