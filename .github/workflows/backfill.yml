name: Backfill lottery history

# ดึงข้อมูลผลสลากย้อนหลังจาก sanook.com
# Workflow นี้ self-contained — ไม่ต้องตั้ง SCRAPER_URL หรือ ADMIN_TOKEN secret
# เพราะจะสุ่ม ADMIN_TOKEN ใหม่ทุกครั้ง แล้ว rotate ผ่าน wrangler secret put
# ต้องมี secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID

on:
  workflow_dispatch:
    inputs:
      years:
        description: "จำนวนปีย้อนหลัง (ค่าสูงสุด ~22)"
        required: true
        default: "20"
        type: string
      force:
        description: "ลบหมายเลขเดิมก่อนเขียนใหม่ (ใช้เมื่อ parser ถูกแก้และต้องเขียนทับข้อมูลเก่าที่ผิด)"
        required: false
        default: false
        type: boolean

concurrency:
  group: backfill
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund

      - name: Resolve D1 ID (required for scraper config)
        id: d1
        run: |
          set -euo pipefail
          id=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="lottery_th") | .uuid')
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            echo "::error::D1 database 'lottery_th' not found — run Bootstrap first"
            exit 1
          fi
          echo "d1_id=$id" >> "$GITHUB_OUTPUT"
          sed -i "s/REPLACE_WITH_D1_ID/$id/g" workers/scraper/wrangler.toml

      - name: Resolve scraper worker URL
        id: scraper
        run: |
          set -euo pipefail
          sub=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | jq -r '.result.subdomain')
          url="https://lottery-th-scraper.${sub}.workers.dev"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Scraper URL: $url"

      - name: Rotate ADMIN_TOKEN and call /backfill
        run: |
          set -euo pipefail
          TOKEN=$(openssl rand -hex 32)
          echo "::add-mask::$TOKEN"
          printf '%s' "$TOKEN" | npx wrangler secret put ADMIN_TOKEN --config workers/scraper/wrangler.toml
          sleep 8  # secret propagation

          # force=1 → ลบหมายเลขเดิมของทุกงวดก่อนเขียนใหม่ (ต้องใช้หลังแก้ parser bug
          #            ที่ทำให้ข้อมูลเก่าถูกจัดเก็บผิด — INSERT OR IGNORE อย่างเดียวไม่พอ)
          FORCE_QS=""
          if [ "${{ inputs.force }}" = "true" ]; then FORCE_QS="&force=1"; fi
          endpoint="${{ steps.scraper.outputs.url }}/backfill?years=${{ inputs.years }}${FORCE_QS}"
          echo "POST $endpoint"

          # Retry on 401 — Cloudflare Worker secret propagation is eventually
          # consistent; 8 s usually works but occasionally isn't enough. Retry
          # a handful of times with increasing backoff before giving up.
          response=""
          for attempt in 1 2 3 4 5; do
            http_code=$(curl -sS -o /tmp/backfill_resp.json -w "%{http_code}" \
              -X POST "$endpoint" \
              -H "X-Admin-Token: $TOKEN" \
              --max-time 1500 || echo "000")
            if [ "$http_code" = "200" ]; then
              response=$(cat /tmp/backfill_resp.json)
              break
            fi
            if [ "$http_code" = "401" ] && [ "$attempt" -lt 5 ]; then
              wait=$((attempt * 5))
              echo "::warning::got 401 on attempt $attempt — waiting ${wait}s for secret propagation"
              sleep "$wait"
              continue
            fi
            echo "::error::backfill failed: HTTP $http_code"
            cat /tmp/backfill_resp.json || true
            exit 1
          done
          echo "$response"
          echo "$response"
          added=$(echo "$response" | jq -r '.added // 0')
          {
            echo "## 📥 Backfill ${{ inputs.years }} ปี เสร็จสิ้น"
            echo ""
            echo "- เพิ่มงวดใหม่: **$added**"
            echo ""
            echo "\`\`\`json"
            echo "$response"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          # check status
          status=$(curl -fsS "${{ steps.scraper.outputs.url }}/status" -H "X-Admin-Token: $TOKEN")
          {
            echo ""
            echo "### 📊 สถานะปัจจุบัน"
            echo "\`\`\`json"
            echo "$status"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
