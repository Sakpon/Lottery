name = "lottery-th-scraper"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# สลากออกประมาณ 16:00–17:00 ICT (UTC+7) ของวันที่ 1 และ 16 ของแต่ละเดือน
# งวดตรงกับวันหยุดราชการ (เช่น 1 พ.ค. วันแรงงาน, 5 ธ.ค. วันคล้ายวันเกิด ร.9)
# จะถูกเลื่อนไปวันถัดไป — รอบ next-day จึงจำเป็นเพื่อจับงวดเลื่อนเหล่านี้
#   • 17:30 ICT (10:30 UTC) วันที่ 1,16 — รอบหลัก จับงวดที่ออกตรงวัน
#   • 17:00 ICT (10:00 UTC) วันที่ 2,17 — next-day catch-all
#       จับงวดที่เลื่อนจากวันก่อน (และเป็น safety net ถ้ารอบแรกล้มเหลว)
# (จำกัด 2 รายการเพื่อให้พอดีกับ account-wide limit 5 cron triggers ของ Free plan)
[triggers]
crons = [
  "30 10 1,16 * *",
  "0 10 2,17 * *"
]

[[d1_databases]]
binding = "DB"
database_name = "lottery_th"
database_id = "REPLACE_WITH_D1_ID"

[vars]
SOURCE_BASE = "https://news.sanook.com/lotto"
USER_AGENT  = "LotteryTHBot/0.1 (+https://github.com/sakpon/lottery) github-actions"
BACKFILL_YEARS = "20"

# สำหรับ manual trigger backfill จาก HTTP
[observability]
enabled = true
