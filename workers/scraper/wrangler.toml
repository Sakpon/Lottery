name = "lottery-th-scraper"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# สลากออกประมาณ 16:00–17:00 ICT (UTC+7) ของวันที่ 1 และ 16 ของแต่ละเดือน
# รัน 2 จังหวะในวันออกผลเพื่อรองรับความล่าช้าของ sanook ในการเผยแพร่:
#   • 17:30 ICT (10:30 UTC) — จังหวะหลักหลังประกาศผล
#   • 19:30 ICT (12:30 UTC) — retry กรณีรอบแรก sanook ยังไม่อัปเดต
# ถ้าทั้งสองรอบ fail ให้ trigger workflow "Backfill lottery history" เพื่อกู้คืน
# (จำกัด 2 รายการเพื่อให้พอดีกับ account-wide limit 5 cron triggers ของ Free plan)
[triggers]
crons = [
  "30 10 1,16 * *",
  "30 12 1,16 * *"
]

[[d1_databases]]
binding = "DB"
database_name = "lottery_th"
database_id = "REPLACE_WITH_D1_ID"

[vars]
SOURCE_BASE = "https://news.sanook.com/lotto"
USER_AGENT  = "LotteryTHBot/0.1 (+https://github.com/sakpon/lottery) github-actions"
BACKFILL_YEARS = "20"

# สำหรับ manual trigger backfill จาก HTTP
[observability]
enabled = true
